<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>diffdeck render-parity harness</title>
		<style>
			html,
			body {
				margin: 0;
				height: 100%;
				background: #141415;
				color: #adadb1;
				font-family:
					system-ui,
					-apple-system,
					"Segoe UI",
					sans-serif;
			}
			#app {
				display: grid;
				grid-template-columns: 260px 1fr;
				grid-template-rows: auto 1fr;
				height: 100vh;
			}
			#banner {
				grid-column: 1 / 3;
				padding: 8px 12px;
				border-bottom: 1px solid #070707;
				font-size: 13px;
				color: #84848a;
			}
			#tree {
				overflow: auto;
				padding-top: 8px;
				border-right: 1px solid #070707;
			}
			#diff {
				overflow: auto;
			}
		</style>
	</head>
	<body>
		<div id="app">
			<div id="banner">
				diffdeck render-parity harness — @diffdeck/diffs + @diffdeck/trees,
				fixture.json
			</div>
			<div id="tree"></div>
			<div id="diff"></div>
		</div>
		<script type="module" src="/out/main.js"></script>
	</body>
</html>
