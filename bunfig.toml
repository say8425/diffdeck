[test]
root = "."
# Registers the reusable css-inline Bun plugin (scripts/css-inline-plugin.ts) so
# `bun test` resolves the forked packages' `import styles from '../style.css?inline'`
# to the real stylesheet text. Same plugin the build uses (scripts/parity/build.ts).
preload = ["./scripts/parity/preload.ts"]
