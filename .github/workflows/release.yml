name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - if: ${{ steps.release.outputs.prs_created }}
        run: |
          PR_NUMBER=$(gh pr list --label "autorelease: pending" --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --add-assignee say8425
            gh pr merge "$PR_NUMBER" --auto --rebase
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      # Trusted publishing (OIDC) needs Node >= 22.14.0 and npm >= 11.5.1.
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest
      - run: bun install --frozen-lockfile
      - name: Build the publishable package
        run: bun run build
        working-directory: apps/viewer
      # Auth resolves OIDC-first, token-fallback: npm prefers trusted publishing
      # (id-token: write above) and falls back to NODE_AUTH_TOKEN. So this works
      # now via the NPM_TOKEN secret, and auto-upgrades to fully tokenless once a
      # trusted publisher is configured for @say8425/diffdeck on npmjs.com
      # (org say8425 / repo diffdeck / workflow release.yml). The package must
      # exist first — publish 0.1.0 once manually with a token, since npm has no
      # first-publish OIDC (npm/cli#8544). Remove the env below for pure tokenless
      # once trusted publishing is confirmed working.
      - name: Publish to npm (trusted publishing, token fallback + provenance)
        run: npm publish --provenance --access public
        working-directory: apps/viewer
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
