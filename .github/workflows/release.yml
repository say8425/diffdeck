name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.releases_created }}
    steps:
      # release-please opens/updates the release PR. It is merged by a human on
      # purpose: a release is an npm publish, so it gets a review gate. Merging
      # it by hand also sidesteps the GITHUB_TOKEN recursion guard — a push made
      # by GITHUB_TOKEN would not re-trigger this workflow, so an auto-merged
      # release PR would silently never publish.
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      # Trusted publishing (OIDC) needs Node >= 22.14.0 and npm >= 11.5.1.
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest
      - run: bun install --frozen-lockfile
      - name: Build the publishable package
        run: bun run build
        working-directory: apps/viewer
      # Tokenless: the npm CLI detects the OIDC environment (id-token: write
      # above) and authenticates via the trusted publisher configured for
      # @say8425/diffdeck on npmjs.com (org say8425 / repo diffdeck / workflow
      # release.yml). No NODE_AUTH_TOKEN. (0.1.0 was bootstrapped with a one-off
      # manual token publish, since npm has no first-publish OIDC — npm/cli#8544.)
      - name: Publish to npm (trusted publishing + provenance)
        run: npm publish --provenance --access public
        working-directory: apps/viewer
